name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Run tests before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest -q

  release:
    name: Package and publish GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source archive
        run: |
          TAG=${GITHUB_REF_NAME}
          # Exclude generated / venv artifacts from the archive
          git archive --format=zip --prefix="policy-classifier-${TAG}/" \
            -o "policy-classifier-${TAG}.zip" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "policy-classifier ${{ github.ref_name }}"
          body: |
            ## policy-classifier ${{ github.ref_name }}

            ### Install
            ```bash
            pip install -r requirements.txt
            ```

            ### What's included
            Source archive built from the `${{ github.ref_name }}` tag.
            See [README.md](https://github.com/yidaki53/policy-classifier#readme) for full usage instructions.
          files: "policy-classifier-${{ github.ref_name }}.zip"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
