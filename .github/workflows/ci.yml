name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync environment
        run: uv sync

      - name: Editable install
        run: uv pip install -e .

      - name: Smoke import test
        run: uv run python -c "import swedish_parliament_policy_classifier; import swedish_parliament_policy_classifier.analysis; import swedish_parliament_policy_classifier.models; print('imports OK')"

      - name: Run tests
        run: uv run pytest -q
