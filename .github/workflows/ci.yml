name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv

      - name: Editable install (uv)
        run: uv pip install -e .

      - name: Smoke import test
        run: uv run python3 -c "import swedish_parliament_policy_classifier; import swedish_parliament_policy_classifier.analysis; import swedish_parliament_policy_classifier.models; print('imports OK')"

      - name: Run tests (quick)
        run: uv run pytest -q
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH="$GITHUB_WORKSPACE" python -m pytest -q swedish_parliament_policy_classifier/tests
